name: CreateLog
options:
  bundleIdPrefix: com.createlog
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  # 2026-04-16: プロフィール画像 flicker 対策 (Bluesky/Threads/Instagram 同等品質)。
  # Nuke 13.0+ は Swift 6.2 / Xcode 26 対応 (@globalActor ImagePipelineActor で data race safety)。
  # 3-tier cache (memory rendered / memory raw / disk LRU) を標準装備、AsyncImage の flicker を根絶。
  Nuke:
    url: https://github.com/kean/Nuke
    from: "13.0.0"
targets:
  CreateLog:
    type: application
    platform: iOS
    sources:
      - CreateLog
    info:
      path: CreateLog/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        CFBundleDevelopmentRegion: en
        CFBundleLocalizations:
          - en
          - ja
        LSApplicationQueriesSchemes:
          - line
          - instagram
          - twitter
          - fb-messenger
          - discord
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.sanq3.createlog.auth
            CFBundleURLSchemes:
              - createlog
        UIBackgroundModes:
          - remote-notification
    entitlements:
      path: CreateLog/CreateLog.entitlements
      properties:
        aps-environment: development
        com.apple.developer.applesignin:
          - Default
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sanq3.createlog
        DEVELOPMENT_TEAM: YP9R79UAU5
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSCameraUsageDescription: "プロフィール画像の撮影とQRコードスキャンに使用します"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "プロフィール画像や投稿画像の選択に使用します"
        INFOPLIST_KEY_NSUserNotificationsUsageDescription: "いいね、コメント、フォローなどの通知をお知らせします"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "2.0.0"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Nuke
        product: Nuke
      - package: Nuke
        product: NukeUI
  CreateLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CreateLogTests
    dependencies:
      - target: CreateLog
    settings:
      base:
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/CreateLog.app/CreateLog
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: YP9R79UAU5
        GENERATE_INFOPLIST_FILE: YES
